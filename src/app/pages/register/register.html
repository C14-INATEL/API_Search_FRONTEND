<section class="bg">
  <div class="animation">
    <div class="cloud-container">
      <div class="cloud">
        <img src="assets/cloudsvertical.png" alt="cloud" class="img_cloud">
      </div>
    </div>

    <div id="stars"></div>
    <div id="stars2"></div>
    <div id="stars3"></div>
  </div>

  <div class="alingment">
    <div class="container">
    <div class="card">
      <img src="assets/API_logo.png" width="30%" class="logo">
      <h1>API SEARCH</h1>
    
      <form>
        <div class="input-group">
        <label>Nome</label>
        <input  
                type="text"
                placeholder="Digite seu Nome" 
                [(ngModel)]="user.name"
                name="name"/>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input  
                type="text"
                placeholder="Digite seu email"
                [(ngModel)]="user.email"
                name="email"/>
      </div>

      <div class="input-group">
        <label>Senha</label>
        <input 
                [type]="mostrarSenha ? 'text' : 'password'" 
                placeholder="Digite sua Senha"
                autocomplete="current-password"
                [(ngModel)]="user.password"
                name="password"
              />
          <div class="show-icon" *ngIf="mostrarSenha" (click)="toggleSenha()">
            <span class="material-symbols-outlined">visibility</span>
          </div>

          <div class="hide-icon" *ngIf="!mostrarSenha" (click)="toggleSenha()">
            <span class="material-symbols-outlined">visibility_off</span>
          </div>
      </div>

      <div class="input-group">
        <label>Confirme sua Senha</label>
        <input type="confirmpassword" [type]="mostrarSenha ? 'text' : 'password'" placeholder="Confirme sua Senha" autocomplete="current-password"/>

          <div class="show-icon" *ngIf="mostrarSenha" (click)="toggleSenha()">
            <span class="material-symbols-outlined">visibility</span>
          </div>

          <div class="hide-icon" *ngIf="!mostrarSenha" (click)="toggleSenha()">
            <span class="material-symbols-outlined">visibility_off</span>
          </div>
      </div>
    </form>

    <button id="btn" class="login" (click)="save()" routerLink="/">Entrar</button>
    <p class="p2"> Já tem uma conta? </p>
    <button class="go-register" routerLink="/login">Login</button>

    </div>
  </div>
  </div>
</section>
